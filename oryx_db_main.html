<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oryx Mix — DWC Equipment Database</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0c0f; --plant-img:url(""); --surface:#111318; --surface2:#181c22; --border:#1e242d; --border2:#252c38;
  --accent:#f59e0b; --accent2:#fbbf24; --accent-dim:rgba(245,158,11,0.12); --accent-glow:rgba(245,158,11,0.25);
  --text:#e2e8f0; --text2:#94a3b8; --text3:#475569;
  --green:#22c55e; --green-dim:rgba(34,197,94,0.12);
  --red:#ef4444; --red-dim:rgba(239,68,68,0.1);
  --blue:#3b82f6; --blue-dim:rgba(59,130,246,0.12);
  --purple:#a855f7; --purple-dim:rgba(168,85,247,0.12);
  --cyan:#06b6d4; --cyan-dim:rgba(6,182,212,0.1);
  --orange:#f97316;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  color:var(--text);
  font-family:'IBM Plex Sans',sans-serif;
  font-size:14px;
  min-height:100vh;
  overflow-x:hidden;
  background-color:var(--bg);
  background-image:url('');
  background-size:cover;
  background-position:center center;
  background-attachment:fixed;
  background-repeat:no-repeat;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:rgba(10,12,15,0.82);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  z-index:0;
  pointer-events:none;
}

body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(245,158,11,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(245,158,11,0.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(10,12,15,0.45);backdrop-filter:blur(18px) saturate(180%);-webkit-backdrop-filter:blur(18px) saturate(180%);border-bottom:1px solid rgba(245,158,11,0.18);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:64px;transition:background 0.4s;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-hex{width:34px;height:34px;background:var(--accent);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-text{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;letter-spacing:1px;}
.logo-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
.header-right{display:flex;align-items:center;gap:14px;}
.plant-badge{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(245,158,11,0.3);padding:4px 10px;border-radius:4px;letter-spacing:1px;}
.export-btn{background:var(--accent-dim);border:1px solid rgba(245,158,11,0.4);color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;padding:8px 16px;border-radius:5px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .15s;white-space:nowrap;}
.export-btn:hover{background:rgba(245,158,11,0.2);border-color:var(--accent);}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 60px);position:relative;z-index:1;}

/* SIDEBAR */













/* MAIN */
.main{flex:1;padding:28px;overflow-x:auto;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px;}
.stat-card{background:rgba(17,19,24,0.5);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:16px;position:relative;overflow:hidden;transition:all 0.25s;cursor:default;}.stat-card:hover{background:rgba(17,19,24,0.7);border-color:rgba(245,158,11,0.25);transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,0.3);}
.stat-card:hover{border-color:var(--border2);}
.stat-bar{position:absolute;top:0;left:0;width:3px;height:100%;border-radius:8px 0 0 8px;}
.stat-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.stat-value{font-family:'Rajdhani',sans-serif;font-size:30px;font-weight:700;line-height:1;margin-bottom:3px;}
.stat-sub{font-size:11px;color:var(--text3);}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:22px;flex-wrap:wrap;}
.search-wrap{position:relative;flex:1;min-width:200px;}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border2);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px;padding:9px 12px 9px 34px;border-radius:6px;outline:none;transition:border-color .15s;}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);}
.search-input::placeholder{color:var(--text3);}
.filter-btn{background:var(--surface);border:1px solid var(--border2);color:var(--text2);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.5px;padding:9px 14px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap;}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);}
.filter-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.view-btn{background:var(--surface);border:1px solid var(--border2);color:var(--text3);font-size:16px;padding:8px 12px;border-radius:6px;cursor:pointer;transition:all .15s;}
.view-btn.active,.view-btn:hover{border-color:var(--accent);color:var(--accent);}

/* TABLE */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:28px;}
.section-head{display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid var(--border2);background:rgba(0,0,0,0.2);}
.section-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.section-title{font-family:'Rajdhani',sans-serif;font-size:19px;font-weight:600;letter-spacing:.5px;}
.section-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;margin-top:2px;}
.section-count{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2);background:var(--surface2);border:1px solid var(--border2);padding:3px 10px;border-radius:20px;}
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--surface2);border-bottom:1px solid var(--border2);}
th{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;padding:10px 14px;text-align:left;white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:rgba(255,255,255,0.03);}
td{padding:10px 14px;color:var(--text2);font-size:13px;vertical-align:middle;}
td.num{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text3);text-align:center;width:40px;}
td.desig{color:var(--text);font-weight:500;}
td.model-cell{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--cyan);white-space:nowrap;}
td.mono-cell{font-family:'IBM Plex Mono',monospace;font-size:12px;}
.thumb{width:36px;height:36px;border-radius:4px;object-fit:cover;border:1px solid var(--border2);cursor:pointer;transition:transform .2s,border-color .2s;flex-shrink:0;}
.thumb:hover{transform:scale(1.08);border-color:var(--accent);}
.no-img{width:36px;height:36px;border-radius:4px;background:var(--surface2);border:1px dashed var(--border2);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:10px;}
.badge{display:inline-flex;align-items:center;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;padding:2px 8px;border-radius:3px;letter-spacing:.5px;white-space:nowrap;}
.b-motor{background:var(--blue-dim);color:var(--blue);}
.b-pump{background:var(--cyan-dim);color:var(--cyan);}
.b-drum{background:var(--purple-dim);color:var(--purple);}
.b-screw{background:var(--accent-dim);color:var(--accent);}
.b-hyd{background:var(--red-dim);color:var(--red);}
.b-default{background:var(--surface2);color:var(--text3);}
.b-sshape{background:var(--purple-dim);color:var(--purple);}
.b-shear{background:var(--blue-dim);color:var(--blue);}
.kw{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--green);background:var(--green-dim);padding:2px 7px;border-radius:3px;display:inline-block;}
.qty{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text);background:var(--surface2);border:1px solid var(--border2);padding:1px 8px;border-radius:3px;display:inline-block;text-align:center;min-width:28px;}
.dash{color:var(--text3);}
.remarks-cell{font-size:11.5px;color:var(--text3);font-style:italic;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.add-row-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;background:transparent;border:1px dashed var(--border2);border-top:none;color:var(--text3);font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;width:100%;transition:all .15s;}
.add-row-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.no-results{text-align:center;padding:40px;color:var(--text3);font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:1px;}

/* GRID VIEW */
.grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;padding:16px;}
.eq-card{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s;}
.eq-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.eq-card-img{width:100%;height:160px;object-fit:cover;background:var(--surface);}
.eq-card-img-placeholder{width:100%;height:160px;background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:28px;}
.eq-card-body{padding:12px;}
.eq-card-title{font-weight:500;color:var(--text);margin-bottom:4px;font-size:13px;}
.eq-card-model{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--cyan);margin-bottom:8px;}
.eq-card-meta{display:flex;gap:6px;flex-wrap:wrap;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;max-width:760px;width:90%;max-height:90vh;overflow-y:auto;position:relative;animation:modalIn .2s ease;}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-close{position:absolute;top:14px;right:14px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;z-index:10;transition:all .15s;}
.modal-close:hover{border-color:var(--accent);color:var(--accent);}
.modal-img{width:100%;max-height:400px;object-fit:contain;background:#000;border-radius:8px 8px 0 0;}
.modal-body{padding:24px;}
.modal-title{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:600;margin-bottom:4px;}
.modal-model{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--cyan);margin-bottom:16px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-field{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 14px;}
.modal-field-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:4px;}
.modal-field-value{font-size:13px;color:var(--text);}

/* SUMMARY SECTION */
.summary-section{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-top:12px;overflow:hidden;}
.summary-header{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border2);background:rgba(0,0,0,0.2);}
.summary-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:600;letter-spacing:.5px;}
.summary-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;margin-top:2px;}
.summary-table-wrap{overflow-x:auto;}
.sum-row{display:grid;grid-template-columns:1fr 140px 160px 220px;border-bottom:1px solid var(--border);align-items:center;}
.sum-row:last-child{border-bottom:none;}
.sum-row:hover{background:rgba(255,255,255,0.02);}
.sum-head{background:var(--surface2);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;}
.sum-cell{padding:11px 16px;font-size:13px;}
.sum-cell.model{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--cyan);}
.sum-cell.total{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--accent);}
.plant-tag{display:inline-flex;align-items:center;font-family:'IBM Plex Mono',monospace;font-size:10px;padding:2px 7px;border-radius:3px;background:var(--blue-dim);color:var(--blue);margin:2px;white-space:nowrap;}


/* ── PLANT TABS ── */
.plant-tabs{display:flex;gap:6px;margin-bottom:28px;background:rgba(10,12,15,0.35);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:6px;width:fit-content;box-shadow:0 4px 24px rgba(0,0,0,0.3);}
.plant-tab{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:9px 18px;cursor:pointer;color:var(--text3);border:1px solid transparent;background:transparent;border-radius:8px;margin-bottom:0;transition:all 0.25s;display:flex;align-items:center;gap:8px;white-space:nowrap;position:relative;overflow:hidden;}
.plant-tab:hover{color:var(--text2);background:var(--surface2);}
.plant-tab.active{color:var(--accent);background:rgba(245,158,11,0.14);border:1px solid rgba(245,158,11,0.3);box-shadow:0 0 16px rgba(245,158,11,0.15);}
.plant-tab .tab-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.plant-tab .tab-badge{font-size:9px;padding:1px 6px;border-radius:10px;background:var(--surface2);color:var(--text3);border:1px solid var(--border2);}
.plant-tab.active .tab-badge{background:rgba(245,158,11,0.15);color:var(--accent);border-color:rgba(245,158,11,0.3);}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

@media(max-width:768px){.main{padding:14px;}header{padding:0 14px;}.modal-grid{grid-template-columns:1fr;}}
</style>
<script>
var _imgReady=0;
function _applyImgs(obj){
  if(!obj)return;
  Object.keys(obj).forEach(function(k){
    if(typeof IMAGES!=='undefined')IMAGES[k]=obj[k];
  });
  if(obj['__bg__']){
    document.documentElement.style.setProperty('--plant-img','url("'+obj['__bg__']+'")');
  }
  _imgReady++;
}
</script>
<script src="oryx_img1.js" onload="_applyImgs(window._IP1)"></script>
<script src="oryx_img2.js" onload="_applyImgs(window._IP2)"></script>
<script src="oryx_img3.js" onload="_applyImgs(window._IP3)"></script>
<script src="oryx_img4.js" onload="_applyImgs(window._IP4)"></script>
</head>

let filter = 'all', search = '', viewMode = 'table';

// ── HELPERS ──
function kw(v){return(!v||v==='—')?'<span class="dash">—</span>':`<span class="kw">${v}</span>`;}
function qty(v){return(!v||v==='—')?'<span class="dash">—</span>':`<span class="qty">${v}</span>`;}
function model(v){return(!v||v==='—')?'<span class="dash">—</span>':`<span class="model-cell">${v}</span>`;}
function badge(t,cls){return t?`<span class="badge ${cls}">${t}</span>`:'';}
function catBadge(c){
  const m={'Motor':'b-motor','Water pump':'b-pump','Drive drum':'b-drum',
    'Silco screw':'b-screw','Silo screw':'b-screw','Hydraulic pump':'b-hyd','Model':'b-default'};
  return badge(c, m[c]||'b-default');
}
function typeBadge(t){
  const m={'S-shape':'b-sshape','Shear beam':'b-shear','Shear beam (Bolt)':'b-shear'};
  return badge(t, m[t]||'b-default');
}
function imgThumb(section, rowIdx){
  const src = getImg(section, rowIdx);
  if(!src) return '<div class="no-img">—</div>';
  return `<img class="thumb" src="${src}" onclick="event.stopPropagation();openImgOnly('${section}',${rowIdx})" alt="">`;
}
function scrollToEl(id){document.getElementById(id)?.scrollIntoView({behavior:'smooth',block:'start'});}

// ── SIDEBAR ──
function buildSidebar(){
  const el = document.getElementById('sidebarNav');
  let h = '';
  Object.entries(DB).forEach(([name,data],i)=>{
    const id = 'sec_'+name.replace(/[^a-z0-9]/gi,'_');
    h+=`<div class="nav-item${i===0?' active':''}" id="nav_${id}" onclick="scrollToEl('${id}');highlightNav(this)">
      <div class="nav-dot" style="background:${data.color}"></div>
      <span class="nav-label">${name}</span>
      <span class="nav-count">${data.rows.length}</span>
    </div>`;
  });
  el.innerHTML = h;
}
function highlightNav(el){document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));el.classList.add('active');}

function rowCells(sname, row, ri){

// ── RENDER TABLE ──
function renderTable(sname, data){
  const sl = search.toLowerCase();
  const rows = data.rows.filter((r,i)=>{
    const mf = filter==='all'||Object.values(r).some(v=>String(v||'').toLowerCase().includes(filter.toLowerCase()));
    const ms = !sl||Object.values(r).some(v=>String(v||'').toLowerCase().includes(sl));
    return mf && ms;
  });
  if(!rows.length && (search||filter!=='all')) return '';
  const id = 'sec_'+sname.replace(/[^a-z0-9]/gi,'_');
  if(viewMode==='grid'){
    const cards = rows.map((r,ri)=>{
      const imgSrc = getImg(sname, data.rows.indexOf(r));
      const imgEl = imgSrc
        ? `<img class="eq-card-img" src="${imgSrc}" alt="${r.desig||''}">`
        : `<div class="eq-card-img-placeholder">${data.icon}</div>`;
      return `<div class="eq-card" onclick="openModal('${sname}',${data.rows.indexOf(r)})">
        ${imgEl}
        <div class="eq-card-body">
          <div class="eq-card-title">${r.desig||r.designation||''}</div>
          <div class="eq-card-model">${r.model||'—'}</div>
          <div class="eq-card-meta">
            ${r.cat?catBadge(r.cat):''}
            ${r.kw?kw(r.kw):''}
            ${r.qty?`<span class="qty">${r.qty}</span>`:''}
          </div>
        </div>
      </div>`;
    }).join('');
    return `<div class="table-wrap" id="${id}">
      <div class="section-head">
        <div class="section-dot" style="background:${data.color};box-shadow:0 0 8px ${data.color}50"></div>
        <div><div class="section-title">${data.icon} ${sname}</div><div class="section-sub">DWC · BP-21 to 24</div></div>
        <div class="section-count">${rows.length} items</div>
      </div>
      <div class="grid-view">${cards}</div>
    </div>`;
  }
  const trows = rows.map((r,ri)=>{
    const origIdx = data.rows.indexOf(r);
    return `<tr onclick="openModal('${sname}',${origIdx})">${rowCells(sname,r,origIdx)}</tr>`;
  }).join('');
  return `<div class="table-wrap" id="${id}">
    <div class="section-head">
      <div class="section-dot" style="background:${data.color};box-shadow:0 0 8px ${data.color}50"></div>
      <div><div class="section-title">${data.icon} ${sname}</div><div class="section-sub">DWC · BP-21 to 24</div></div>
      <div class="section-count">${rows.length} items</div>
    </div>
    <table><thead><tr>${data.cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
    <tbody>${trows||`<tr><td colspan="${data.cols.length}" class="no-results">NO ITEMS MATCH</td></tr>`}</tbody></table>
    <button class="add-row-btn" onclick="addRow('${sname}')">+ ADD ROW</button>
  </div>`;
}

// ── MASTER SUMMARY ──
function buildSummary(){
  let sectionsHTML = '';
  let grandModels = 0;

  Object.entries(DB).forEach(([sname, data])=>{
    const modelMap = {};
    data.rows.forEach(row=>{
      const m = row.model||'—';
      if(m==='—') return;
      if(!modelMap[m]) modelMap[m]={totalQty:0, plants:[]};
      const q = parseInt(row.qty)||0;
      modelMap[m].totalQty += q;
      const asset = row.asset||'BP-21 to 24';
      if(asset && !modelMap[m].plants.includes(asset)) modelMap[m].plants.push(asset);
    });

    const entries = Object.entries(modelMap).sort((a,b)=>b[1].totalQty-a[1].totalQty);
    if(!entries.length) return;
    grandModels += entries.length;

    const itemRows = entries.map(([m,v])=>{
      const plants = v.plants.map(p=>`<span class="plant-tag">${p}</span>`).join('');
      return `<div class="sum-row">
        <div class="sum-cell model">${m}</div>
        <div class="sum-cell total">${v.totalQty} <span style="font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace">pcs</span></div>
        <div class="sum-cell">${plants||'<span class="plant-tag">BP-21 to 24</span>'}</div>
      </div>`;
    }).join('');

    sectionsHTML += `
      <div class="sum-cat-block">
        <div class="sum-cat-head" style="border-left:3px solid ${data.color}">
          <span style="font-size:16px">${data.icon}</span>
          <span class="sum-cat-title">${sname}</span>
          <span class="sum-cat-badge" style="background:${data.color}20;color:${data.color};border:1px solid ${data.color}40">${entries.length} models</span>
        </div>
        <div class="sum-row sum-head">
          <div class="sum-cell">Model Number</div>
          <div class="sum-cell">Total Qty</div>
          <div class="sum-cell">Plants</div>
        </div>
        ${itemRows}
      </div>`;
  });

  return `<div class="summary-section" id="summarySection">
    <div class="summary-header">
      <div class="section-dot" style="background:var(--accent);box-shadow:0 0 8px var(--accent-glow)"></div>
      <div>
        <div class="summary-title">📊 Master Quantity Summary</div>
        <div class="summary-sub">By category · Model number · Total qty · Plant coverage</div>
      </div>
      <div class="section-count">${grandModels} unique models</div>
    </div>
    ${sectionsHTML}
  </div>`;
}

// ── MODAL ──
function openModal(sname, idx){
  const section = DB[sname];
  const row = section.rows[idx];
  if(!row) return;
  const imgSrc = getImg(sname, idx);
  const imgEl = document.getElementById('modalImg');
  if(imgSrc){imgEl.src=imgSrc;imgEl.style.display='block';}
  else{imgEl.style.display='none';}
  document.getElementById('modalTitle').textContent = row.desig||row.designation||'Equipment';
  document.getElementById('modalModel').textContent = row.model||'Model N/A';
  const fields = Object.entries(row).filter(([k])=>k!=='desig'&&k!=='designation'&&k!=='model').map(([k,v])=>`
    <div class="modal-field">
      <div class="modal-field-label">${k}</div>
      <div class="modal-field-value">${v||'—'}</div>
    </div>`).join('');
  document.getElementById('modalFields').innerHTML = fields;
  document.getElementById('modalOverlay').classList.add('open');
}
function openImgOnly(sname,idx){openModal(sname,idx);}
function closeModal(e){if(e.target===document.getElementById('modalOverlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modalOverlay').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModalDirect();});

// ── CONTROLS ──
function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function applySearch(){search=document.getElementById('searchInput').value;render();}
function setView(v,btn){
  viewMode=v;
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function addRow(sname){
  const t={};Object.keys(DB[sname].rows[0]).forEach(k=>t[k]='');
  DB[sname].rows.push(t);render();
}
function exportCSV(){
  let csv='';
  Object.entries(DB).forEach(([n,d])=>{
    csv+=`\n=== ${n} ===\n`;
    csv+=Object.keys(d.rows[0]).join(',')+'\n';
    d.rows.forEach(r=>csv+=Object.values(r).map(v=>`"${String(v||'')}"`).join(',')+'\n');
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='Oryx_DWC_BP21-24_Equipment.csv';a.click();
}

// ── MAIN RENDER ──
function render(){
  let h='';
  Object.entries(DB).forEach(([n,d])=>h+=renderTable(n,d));
  document.getElementById('contentArea').innerHTML=h;
  document.getElementById('statsRow').innerHTML=buildStats();
}
function renderSummary(){
  document.getElementById('summarySection').innerHTML=buildSummary();
}


// ── TAB SWITCHING ──
function switchTab(id, btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.plant-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

// ── PER-PLANT SUMMARY ──
function buildSectionSummary(db, plantLabel, color){
  let sectionsHTML='',grandModels=0;
  Object.entries(db).forEach(([sname,data])=>{
    const mm={};
    data.rows.forEach(r=>{
      const m=r.model||'—'; if(m==='—') return;
      if(!mm[m]) mm[m]={totalQty:0};
      mm[m].totalQty+=parseInt(r.qty)||0;
    });
    const entries=Object.entries(mm).sort((a,b)=>b[1].totalQty-a[1].totalQty);
    if(!entries.length) return; grandModels+=entries.length;
    const rows=entries.map(([m,v])=>`<div class="sum-row"><div class="sum-cell model">${m}</div><div class="sum-cell total">${v.totalQty} <span style="font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace">pcs</span></div><div class="sum-cell"><span class="plant-tag" style="background:${color}18;color:${color};border:1px solid ${color}40">${plantLabel}</span></div></div>`).join('');
    sectionsHTML+=`<div class="sum-cat-block"><div class="sum-cat-head" style="border-left:3px solid ${data.color}"><span style="font-size:15px">${data.icon}</span><span class="sum-cat-title">${sname}</span><span class="sum-cat-badge" style="background:${data.color}20;color:${data.color};border:1px solid ${data.color}40">${entries.length} models</span></div><div class="sum-row sum-head"><div class="sum-cell">Model Number</div><div class="sum-cell">Total Qty</div><div class="sum-cell">Plant</div></div>${rows}</div>`;
  });
  return `<div class="summary-section" style="margin-top:28px"><div class="summary-header"><div class="section-dot" style="background:${color};box-shadow:0 0 8px ${color}50"></div><div><div class="summary-title">📊 ${plantLabel} Summary</div><div class="summary-sub">By category · Model number · Total qty</div></div><div class="section-count">${grandModels} unique models</div></div>${sectionsHTML}</div>`;
}

// ── MASTER SUMMARY (ALL PLANTS COMBINED) ──
function buildSummary(){
  const allDBs=[{db:DB,label:'BP-21 to 24',color:'#f59e0b'},{db:DB1920,label:'BP-19,20',color:'#3b82f6'},{db:DB1718,label:'BP-17,18',color:'#06b6d4'}];
  const catOrder=[];
  allDBs.forEach(({db})=>Object.keys(db).forEach(c=>{if(!catOrder.includes(c))catOrder.push(c);}));
  let sectionsHTML='',grandModels=0;
  catOrder.forEach(sname=>{
    const meta=DB[sname]||DB1920[sname]||DB1718[sname];
    const mm={};
    allDBs.forEach(({db,label})=>{
      if(!db[sname]) return;
      db[sname].rows.forEach(r=>{
        const m=r.model||'—'; if(m==='—') return;
        if(!mm[m]) mm[m]={totalQty:0,plants:[]};
        mm[m].totalQty+=parseInt(r.qty)||0;
        if(!mm[m].plants.includes(label)) mm[m].plants.push(label);
      });
    });
    const entries=Object.entries(mm);
    if(!entries.length) return;
    const shared=entries.filter(([,v])=>v.plants.length>1).sort((a,b)=>b[1].totalQty-a[1].totalQty);
    const single=entries.filter(([,v])=>v.plants.length===1).sort((a,b)=>b[1].totalQty-a[1].totalQty);
    const sorted=[...shared,...single];
    grandModels+=sorted.length;
    const plantColors={'BP-21 to 24':'#f59e0b','BP-19,20':'#3b82f6','BP-17,18':'#06b6d4'};
    const itemRows=sorted.map(([m,v],i)=>{
      const isShared=v.plants.length>1;
      const div=(i===shared.length&&shared.length>0)?`<div style="grid-column:1/-1;height:1px;background:var(--border2);margin:2px 0"></div>`:'';
      const tags=v.plants.map(p=>{const c=plantColors[p]||'#888';return `<span class="plant-tag" style="background:${c}18;color:${c};border:1px solid ${c}40">${p}</span>`;}).join('');
      return `${div}<div class="sum-row" style="${isShared?'background:rgba(255,255,255,0.015)':''}"><div class="sum-cell model">${m}</div><div class="sum-cell total">${v.totalQty} <span style="font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace">pcs</span></div><div class="sum-cell">${tags}</div></div>`;
    }).join('');
    const sharedBadge=shared.length?`<span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--green);background:var(--green-dim);border:1px solid rgba(34,197,94,0.3);padding:2px 8px;border-radius:10px;margin-left:6px">${shared.length} shared</span>`:'';
    sectionsHTML+=`<div class="sum-cat-block"><div class="sum-cat-head" style="border-left:3px solid ${meta.color}"><span style="font-size:15px">${meta.icon}</span><span class="sum-cat-title">${sname}</span><span class="sum-cat-badge" style="background:${meta.color}20;color:${meta.color};border:1px solid ${meta.color}40">${sorted.length} models</span>${sharedBadge}</div><div class="sum-row sum-head"><div class="sum-cell">Model Number</div><div class="sum-cell">Total Qty</div><div class="sum-cell">Used In</div></div>${itemRows}</div>`;
  });
  return `<div class="summary-section" id="summarySection"><div class="summary-header"><div class="section-dot" style="background:var(--accent);box-shadow:0 0 8px var(--accent-glow)"></div><div><div class="summary-title">📊 Master Quantity Summary — All Plants</div><div class="summary-sub">BP-17,18 + BP-19,20 + BP-21 to 24 · 8 plants total · Shared items first</div></div><div class="section-count">${grandModels} unique models</div></div><div style="display:flex;gap:16px;padding:12px 20px;border-bottom:1px solid var(--border2);flex-wrap:wrap"><div style="display:flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3)"><span style="width:10px;height:10px;border-radius:2px;background:#f59e0b;display:inline-block"></span>BP-21 to 24</div><div style="display:flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3)"><span style="width:10px;height:10px;border-radius:2px;background:#3b82f6;display:inline-block"></span>BP-19,20</div><div style="display:flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3)"><span style="width:10px;height:10px;border-radius:2px;background:#06b6d4;display:inline-block"></span>BP-17,18</div><div style="display:flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--green)"><span style="width:10px;height:10px;border-radius:2px;background:var(--green);display:inline-block"></span>Shared</div></div>${sectionsHTML}</div>`;
}

var PROXIES_LIST=[
  function(u){return 'https://corsproxy.io/?'+encodeURIComponent(u);},
  function(u){return 'https://api.allorigins.win/get?url='+encodeURIComponent(u);},
  function(u){return 'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u);},
  function(u){return u;}
];
function robustFetch(waUrl,onSuccess,onFail){
  var idx=0;
  function tryNext(){
    if(idx>=PROXIES_LIST.length){onFail('All proxies failed');return;}
    var url=PROXIES_LIST[idx++](waUrl+'?t='+Date.now());
    fetch(url,{mode:'cors'})
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(d){
        if(d&&typeof d.contents==='string'){try{d=JSON.parse(d.contents);}catch(e){throw new Error('parse');}}
        if(typeof d!=='object'||Array.isArray(d))throw new Error('bad data');
        onSuccess(d);
      }).catch(function(){tryNext();});
  }
  tryNext();
}
